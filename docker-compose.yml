version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - vehicle-data:/var/lib/vehicle-service
      - vehicle-backups:/var/backups/vehicle-service
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/dashboard/summary"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  vehicle-data:
    driver: local
  vehicle-backups:
    driver: local

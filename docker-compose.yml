version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - vehicle-data:/var/lib/vehicle-service
      - vehicle-backups:/var/backups/vehicle-service
    environment:
      - PORT=5000
      - DB_PATH=/var/lib/vehicle-service/db/vehicles.db
      - UPLOAD_PATH=/var/lib/vehicle-service/uploads
      - BACKUP_PATH=/var/backups/vehicle-service
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_ADMIN_EMAIL=${VAPID_ADMIN_EMAIL:-admin@localhost}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/dashboard/summary"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  vehicle-data:
    driver: local
  vehicle-backups:
    driver: local
